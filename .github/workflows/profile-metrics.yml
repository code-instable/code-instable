name: Profile metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate developer profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: code-instable
          filename: assets/github/profile-overview.svg

          base: header, activity, repositories
          config_timezone: Europe/Brussels

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss

      - name: Generate open-source contributions card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: code-instable
          filename: assets/github/open-source-contributions.svg

          base: ""
          config_timezone: Europe/Brussels

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: pull_request, issue, commit
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_filter: "stars:>5000"

      - name: Generate academic project cards
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: code-instable
          filename: assets/github/academic-projects.svg

          base: ""
          config_timezone: Europe/Brussels

          plugin_repositories: yes
          plugin_repositories_featured: >
            code-instable/ENSAI-3A-Projet-Methodologie-wAIS,
            code-instable/ENSAI-2A-stage-FGAM,
            code-instable/ENSAI-3A-FDA-Presentation-APLS,
            code-instable/ENSAI-stage_fin_etude-datastorm_fda_regularite-rapport
